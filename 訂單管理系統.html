<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magic Halo 訂單管理</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e0c;
    --surface: #1a1814;
    --surface2: #242018;
    --border: #2e2a22;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --gold-dim: #7a6330;
    --red: #e05050;
    --green: #5a9e72;
    --blue: #5a8bc9;
    --purple: #9a6fc9;
    --text: #e8e0d0;
    --text-dim: #8a8070;
    --text-muted: #5a5248;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  /* Header */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-title {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .header-logo {
    width: 32px;
    height: 32px;
    background: var(--gold);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }

  .header-text h1 {
    font-family: 'Noto Serif TC', serif;
    font-size: 16px;
    color: var(--gold-light);
    font-weight: 700;
    letter-spacing: 0.05em;
  }

  .header-text p {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 1px;
  }

  .header-stats {
    display: flex;
    gap: 20px;
  }

  .stat-chip {
    text-align: center;
  }

  .stat-chip .num {
    font-family: 'Noto Serif TC', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--gold);
    line-height: 1;
  }

  .stat-chip .label {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  /* Controls */
  .controls {
    padding: 16px 24px;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .search-box {
    flex: 1;
    min-width: 200px;
    position: relative;
  }

  .search-box input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px 8px 36px;
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-box input:focus {
    border-color: var(--gold-dim);
  }

  .search-box input::placeholder { color: var(--text-muted); }

  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 14px;
  }

  .filter-btns {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .filter-btn:hover { border-color: var(--gold-dim); color: var(--text); }
  .filter-btn.active { background: var(--gold); border-color: var(--gold); color: #0f0e0c; font-weight: 500; }

  /* Main layout */
  .main { padding: 20px 24px; }

  /* Order card */
  .order-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 12px;
    overflow: hidden;
    transition: border-color 0.2s, transform 0.2s;
  }

  .order-card:hover {
    border-color: var(--gold-dim);
    transform: translateY(-1px);
  }

  .order-card.status-done {
    opacity: 0.6;
    border-color: transparent;
  }

  .card-header {
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    user-select: none;
  }

  .card-num {
    font-family: 'Noto Serif TC', serif;
    font-size: 11px;
    color: var(--text-muted);
    min-width: 24px;
  }

  .card-name {
    font-family: 'Noto Serif TC', serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--gold-light);
    min-width: 72px;
  }

  .card-date {
    font-size: 11px;
    color: var(--text-muted);
    min-width: 100px;
  }

  .item-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    flex: 1;
  }

  .item-tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    white-space: nowrap;
  }

  .tag-love { background: rgba(224, 80, 80, 0.15); color: #e08080; border: 1px solid rgba(224, 80, 80, 0.2); }
  .tag-wealth { background: rgba(201, 168, 76, 0.15); color: #c9a84c; border: 1px solid rgba(201, 168, 76, 0.2); }
  .tag-karma { background: rgba(154, 111, 201, 0.15); color: #b090d8; border: 1px solid rgba(154, 111, 201, 0.2); }
  .tag-luck { background: rgba(90, 158, 114, 0.15); color: #7abe96; border: 1px solid rgba(90, 158, 114, 0.2); }
  .tag-social { background: rgba(90, 139, 201, 0.15); color: #80aadc; border: 1px solid rgba(90, 139, 201, 0.2); }
  .tag-special { background: rgba(200, 120, 60, 0.15); color: #e09060; border: 1px solid rgba(200, 120, 60, 0.2); }

  .card-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-left: auto;
  }

  .status-badge {
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 4px;
    font-weight: 500;
    white-space: nowrap;
  }

  .badge-pending { background: rgba(201, 168, 76, 0.15); color: var(--gold); border: 1px solid rgba(201, 168, 76, 0.3); }
  .badge-checked { background: rgba(90, 158, 114, 0.15); color: var(--green); border: 1px solid rgba(90, 158, 114, 0.3); }
  .badge-returned { background: rgba(154, 111, 201, 0.15); color: var(--purple); border: 1px solid rgba(154, 111, 201, 0.3); }

  .check-toggle {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    font-family: inherit;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--text-muted);
    white-space: nowrap;
  }
  .check-toggle.on-green { border-color: rgba(90,158,114,0.5); color: var(--green); background: rgba(90,158,114,0.1); }
  .check-toggle.on-purple { border-color: rgba(154,111,201,0.5); color: var(--purple); background: rgba(154,111,201,0.1); }
  .check-toggle:hover { border-color: var(--gold-dim); color: var(--text); }

  .toggle-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 12px;
    padding: 4px;
    transition: color 0.2s, transform 0.2s;
  }

  .toggle-btn.open { transform: rotate(180deg); }

  /* Expanded detail */
  .card-detail {
    display: none;
    border-top: 1px solid var(--border);
    padding: 16px;
    background: var(--bg);
  }

  .card-detail.open { display: block; }

  .detail-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 12px;
    margin-bottom: 14px;
  }

  .detail-field label {
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    display: block;
    margin-bottom: 4px;
  }

  .detail-field value {
    font-size: 13px;
    color: var(--text);
    display: block;
  }

  .detail-field value.highlight {
    color: var(--gold-light);
    font-family: 'Noto Serif TC', serif;
  }

  .wish-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--gold-dim);
    border-radius: 4px;
    padding: 10px 14px;
    font-size: 13px;
    color: var(--text);
    line-height: 1.6;
    margin-bottom: 14px;
  }

  .wish-box .wish-label {
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
  }

  /* Partner section */
  .partner-box {
    background: rgba(224, 80, 80, 0.05);
    border: 1px solid rgba(224, 80, 80, 0.15);
    border-radius: 8px;
    padding: 10px 14px;
    margin-bottom: 14px;
  }

  .partner-box .partner-label {
    font-size: 10px;
    color: #e08080;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
  }

  .partner-info {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
  }

  .partner-info span {
    font-size: 13px;
    color: var(--text);
  }

  /* Action bar */
  .detail-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }

  .action-btn {
    padding: 7px 16px;
    border-radius: 6px;
    border: 1px solid;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 500;

  .btn-gold {
    background: var(--gold);
    border-color: var(--gold);
    color: #0f0e0c;
  }

  .btn-gold:hover { background: var(--gold-light); }

  .btn-outline {
    background: transparent;
    border-color: var(--border);
    color: var(--text-dim);
  }

  .btn-outline:hover { border-color: var(--gold-dim); color: var(--text); }

  .btn-green {
    background: transparent;
    border-color: rgba(90, 158, 114, 0.4);
    color: var(--green);
  }

  .btn-green:hover { background: rgba(90, 158, 114, 0.1); }

  .btn-blue {
    background: transparent;
    border-color: rgba(90, 139, 201, 0.4);
    color: var(--blue);
  }

  .btn-blue:hover { background: rgba(90, 139, 201, 0.1); }

  .btn-danger {
    background: transparent;
    border-color: rgba(224, 80, 80, 0.3);
    color: var(--red);
    margin-left: auto;
  }

  .btn-danger:hover { background: rgba(224, 80, 80, 0.1); }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);

  .empty-icon { font-size: 40px; margin-bottom: 12px; }

  /* Notes */
  .note-chip {
    display: inline-block;
    background: rgba(200, 120, 60, 0.1);
    border: 1px solid rgba(200, 120, 60, 0.25);
    border-radius: 4px;
    padding: 2px 8px;
    font-size: 11px;
    color: #e09060;
    margin-left: 8px;

  /* Mobile */
  @media (max-width: 600px) {
    .header { padding: 12px 16px; }
    .header-stats { gap: 12px; }
    .controls { padding: 12px 16px; }
    .main { padding: 12px 16px; }
    .card-date { display: none; }
    .item-tags { display: none; }
  }
</style>
</head>

<script>
// ── Google Sheets 設定 ──
const SHEET_ID = '1E98ZG-MmiOgSqkR8JxW6ygxCVe9hIdjiNnN25EIoIp8';
const SHEET_NAME = 'NEW';
const JSON_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;

let rawOrders = [];

async function loadFromSheets() {
  document.getElementById('order-list').innerHTML = `
    <div class="empty"><div class="empty-icon">🌀</div>
    <div style="margin-top:8px">載入資料中...</div></div>`;
  try {
    // 用 JSONP callback 避開 CORS
    const data = await new Promise((resolve, reject) => {
      const callbackName = 'gvizCallback_' + Date.now();
      const script = document.createElement('script');
      script.src = JSON_URL + `&tqx=out:json;responseHandler:${callbackName}`;
      script.onerror = () => reject(new Error('載入失敗，請確認試算表已公開'));
      window[callbackName] = (json) => {
        delete window[callbackName];
        document.head.removeChild(script);
        resolve(json);
      };
      // timeout 10秒
      setTimeout(() => reject(new Error('連線逾時，請重試')), 10000);
      document.head.appendChild(script);
    });

    const rows = data.table.rows;
    rawOrders = rows
      .filter(r => r.c && r.c[3] && r.c[3].v)
      .map(r => {
        const v = (col) => (r.c && r.c[col] && r.c[col].v != null) ? String(r.c[col].v) : '';
        // 時間欄位特別處理
        let time = '';
        if (r.c && r.c[0] && r.c[0].f) time = r.c[0].f;
        else if (r.c && r.c[0] && r.c[0].v) time = String(r.c[0].v);
        return {
          time, items: v(1), custom: v(2),
          name: v(3), gender: v(4), birthday: v(5),
          address: v(6), partnerName: v(7), partnerGender: v(8),
          partnerBirthday: v(9), wish: v(10),
          payment: v(11), payCode: v(12), extra: v(13),
        };
      });
    render();
  } catch(e) {
    document.getElementById('order-list').innerHTML = `
      <div class="empty"><div class="empty-icon">⚠️</div>
      <div style="margin-top:8px;color:#e08080">讀取失敗：${e.message}</div>
      <div style="margin-top:6px;font-size:12px;color:#5a5248">請確認試算表已設為「知道連結的任何人可檢視」</div>
      <button onclick="loadFromSheets()" style="margin-top:12px;padding:8px 20px;background:var(--gold);border:none;border-radius:6px;color:#0f0e0c;cursor:pointer;font-family:inherit;font-size:13px;">重新載入</button>
      </div>`;
  }
}

// 每筆訂單有兩個獨立狀態
function getChecked(i) { return localStorage.getItem(`order_checked_${i}`) === '1'; }
function getReturned(i) { return localStorage.getItem(`order_returned_${i}`) === '1'; }
function toggleChecked(i) {
  localStorage.setItem(`order_checked_${i}`, getChecked(i) ? '0' : '1');
  render();
}
function toggleReturned(i) {
  localStorage.setItem(`order_returned_${i}`, getReturned(i) ? '0' : '1');
  render();
}

// 分類 tag
function classifyItem(text) {
  const love = ['姻緣', '桃花', '感情', '單身'];
  const wealth = ['財', '正財', '財庫'];
  const karma = ['冤親', '還陰債', '迴向', '祖先'];
  const luck = ['轉運', '消災', '解厄'];
  const social = ['貴人', '人際', '小人', '事業'];
  const special = ['斗', '年斗'];
  
  if (love.some(k => text.includes(k))) return 'love';
  if (karma.some(k => text.includes(k))) return 'karma';
  if (wealth.some(k => text.includes(k))) return 'wealth';
  if (luck.some(k => text.includes(k))) return 'luck';
  if (social.some(k => text.includes(k))) return 'social';
  if (special.some(k => text.includes(k))) return 'special';
  return 'luck';
}

const tagLabel = { love: '❤ 感情', wealth: '💰 財運', karma: '🔮 冤親', luck: '✨ 轉運', social: '🌟 貴人', special: '⭐ 特殊' };

function parseItems(itemStr) {
  return itemStr.split(/[,，]/).map(s => s.trim()).filter(Boolean);
}

function buildTags(itemStr) {
  const items = parseItems(itemStr);
  const seen = new Set();
  let html = '';
  items.forEach(item => {
    const cat = classifyItem(item);
    const key = `${cat}_${item.slice(0,4)}`;
    if (!seen.has(key)) {
      seen.add(key);
      html += `<span class="item-tag tag-${cat}">${item}</span>`;
    }
  });
  return html;
}

let currentFilter = 'all';

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const list = document.getElementById('order-list');
  
  let pending = 0, complete = 0;
  let html = '';
  let shown = 0;

  rawOrders.forEach((o, i) => {
    const checked = getChecked(i);
    const returned = getReturned(i);
    const isComplete = checked && returned;
    if (isComplete) complete++;
    else pending++;

    // filter
    if (currentFilter === 'pending' && (checked || returned)) return;
    if (currentFilter === 'checked' && !checked) return;
    if (currentFilter === 'returned' && !returned) return;
    if (currentFilter === 'complete' && !isComplete) return;
    if (currentFilter === 'love' && !o.items.match(/姻緣|桃花|感情|單身/)) return;
    if (currentFilter === 'wealth' && !o.items.match(/財/)) return;
    if (currentFilter === 'karma' && !o.items.match(/冤親|還陰債|迴向/)) return;

    // search
    const searchable = `${o.name} ${o.address} ${o.wish} ${o.partnerName} ${o.items}`.toLowerCase();
    if (q && !searchable.includes(q)) return;

    shown++;

    const checkedBtn = `<button class="check-toggle ${checked ? 'on-green' : ''}" onclick="event.stopPropagation();toggleChecked(${i})">${checked ? '✓' : '○'} 已核對</button>`;
    const returnedBtn = `<button class="check-toggle ${returned ? 'on-purple' : ''}" onclick="event.stopPropagation();toggleReturned(${i})">${returned ? '✓' : '○'} 已回傳</button>`;

    const hasPartner = o.partnerName && o.partnerName !== '無' && o.partnerName !== '';

    const partnerSection = hasPartner ? `
      <div class="partner-box">
        <div class="partner-label">對象資料</div>
        <div class="partner-info">
          <span>👤 ${o.partnerName}${o.partnerGender ? '（' + o.partnerGender + '）' : ''}</span>
          ${o.partnerBirthday ? `<span>🗓 ${o.partnerBirthday}</span>` : ''}
        </div>
      </div>` : '';

    const wishSection = o.wish && o.wish !== '公版' ? `
      <div class="wish-box">
        <div class="wish-label">願望內容</div>
        ${o.wish}
      </div>` : '';

    const customNote = o.custom ? `<span class="note-chip">${o.custom}</span>` : '';
    const extraNote = o.extra ? `<span class="note-chip">加購: ${o.extra}</span>` : '';

    html += `
    <div class="order-card ${isComplete ? 'status-done' : ''}" id="card-${i}">
      <div class="card-header" onclick="toggleCard(${i})">
        <div class="card-num">#${i+1}</div>
        <div class="card-name">${o.name}${o.gender ? '（' + o.gender + '）' : ''}</div>
        <div class="card-date">${o.time}</div>
        <div class="item-tags">${buildTags(o.items)}</div>
        <div class="card-actions">
          ${customNote}${extraNote}
          ${checkedBtn}
          ${returnedBtn}
          <button class="toggle-btn" id="toggle-${i}">▼</button>
        </div>
      </div>
      <div class="card-detail" id="detail-${i}">
        <div class="detail-grid">
          <div class="detail-field">
            <label>本人生日</label>
            <value class="highlight">${o.birthday}</value>
          </div>
          <div class="detail-field">
            <label>居住地址</label>
            <value>${o.address}</value>
          </div>
          <div class="detail-field">
            <label>付款方式</label>
            <value>${o.payment}</value>
          </div>
          <div class="detail-field">
            <label>匯款後五碼 / 日期</label>
            <value>${o.payCode}</value>
          </div>
        </div>

        ${partnerSection}
        ${wishSection}

        <div class="detail-field" style="margin-bottom:14px">
          <label>訂購項目（共 ${parseItems(o.items).length} 項）</label>
          <div style="margin-top:6px; display:flex; flex-wrap:wrap; gap:4px">
            ${buildTags(o.items)}
          </div>
        </div>

        <div class="detail-actions">
          <button class="action-btn btn-danger" onclick="copyInfo(${i})">📋 複製資料</button>
        </div>
      </div>
    </div>`;
  });

  if (shown === 0) {
    html = `<div class="empty"><div class="empty-icon">🌙</div><div>沒有符合的訂單</div></div>`;
  }

  list.innerHTML = html;
  document.getElementById('stat-total').textContent = rawOrders.length;
  document.getElementById('stat-pending').textContent = pending;
  document.getElementById('stat-done').textContent = complete;
}

function toggleCard(i) {
  const detail = document.getElementById(`detail-${i}`);
  const btn = document.getElementById(`toggle-${i}`);
  detail.classList.toggle('open');
  btn.classList.toggle('open');
}

function copyInfo(i) {
  const o = rawOrders[i];
  const text = `姓名：${o.name}（${o.gender}）
生日：${o.birthday}
地址：${o.address}
${o.partnerName && o.partnerName !== '無' ? `對象：${o.partnerName} ${o.partnerBirthday}\n` : ''}項目：${o.items}
願望：${o.wish}`;
  navigator.clipboard.writeText(text).then(() => {
    alert('已複製到剪貼簿！');
  });
}
